<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Todo Item Card</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <section class="card" data-testid="test-todo-card" id="card">
      <div class="card-header">
        <div>
          <h2 id="title" data-testid="test-todo-title">
            Build a Testable Todo Item Card
          </h2>
          <div id="desc-container" data-testid="test-todo-collapsible-section">
            <p id="desc" data-testid="test-todo-description">
              Build a clean, modern Todo / Task Card component (or a small page
              containing one card).
            </p>
          </div>
          <button
            aria-controls="desc-container"
            aria-expanded="false"
            id="toggleBtn"
            data-testid="test-todo-expand-toggle"
          >
            Show more
          </button>
        </div>

        <span
          class="priority"
          data-testid="test-todo-priority-indicator"
          aria-label="high-priority"
          >High</span
        >
      </div>

      <div class="time">
        <time
          datetime="2026-04-16T18:00:00Z"
          id="duedate"
          data-testid="test-todo-due-date"
          >Due Apr 16, 2026</time
        >

        <time
          class="time-remaining"
          id="time-remaining"
          data-testid="test-todo-time-remaining"
          aria-live="polite"
        ></time>
        <span id="overdue" data-testid="test-todo-overdue-indicator"></span>
      </div>

      <div class="status-check">

        <label>
          <input
            type="checkbox"
            id="checkbox"
            data-testid="test-todo-complete-toggle"
          />
          Mark Complete
        </label>

        <select id="statusControl" data-testid="test-todo-status-control"
        aria-label="Task status">
          <option value="pending" selected>Pending</option>
          <option value="in-progress">In Progress</option>
          <option value="done">Done</option>
        </select>

        <strong
          class="status"
          id="status"
          data-testid="test-todo-status"
          aria-label="Task-status"
        >Pending</strong>
      </div>

      <ul class="tags" role="list" data-testid="test-todo-tags">
        <li class="tag tag-task" data-testid="test-todo-tag-task">Task</li>
        <li class="tag tag-intern" data-testid="test-todo-tag-intern">
          Intern
        </li>
        <li class="tag tag-hng" data-testid="test-todo-tag-hng">HNG</li>
      </ul>

      <div class="buttons">
        <div></div>

        <div class="btn">
          <button
            class="edit"
            data-testid="test-todo-edit-button"
            onclick="editTask()"
          >
            Edit
          </button>
          <button
            class="delete"
            data-testid="test-todo-delete-button"
            onclick="deleteTask()"
          >
            Delete
          </button>
        </div>
      </div>
    </section>

    <div class="edit-container" id="edit-container" hidden>
      <div class="edit-content">
        <form
          action=""
          class="edit-form"
          id="edit-form"
          data-testid="test-todo-edit-form"
        >
          <div class="form-group">
            <label for="editTitle">Task Title </label>
            <input
              type="text"
              class="editTitle"
              id="editTitle"
              data-testid="test-todo-edit-title-input"
            />
          </div>

          <div class="form-group">
            <label for="editDescription">Description</label>
            <textarea
              name="message"
              id="editDescription"
              class="editDescrption"
              data-testid="test-todo-edit-description-input"
            ></textarea>
          </div>

          <div class="form-group">
            <label for="prioritySelect">Priority</label>
            <select
              id="prioritySelect"
              class="prioritySelect"
              data-testid="test-todo-edit-priority-select"
            >
              <option value="low">Low</option>
              <option value="medium">Medium</option>
              <option value="high">High</option>
            </select>
          </div>

          <div class="form-group">
            <label for="duedateInput">Due Date</label>
            <input
              type="datetime-local"
              class="duedateInput"
              id="duedateInput"
              data-testid="test-todo-edit-due-date-input"
            />
          </div>

          <div class="btn-actions">
            <button
              type="submit"
              class="saveButton"
              id="saveButton"
              data-testid="test-todo-save-button"
            >
              Save
            </button>
            <button
              type="button"
              class="cancelButton"
              id="cancelButton"
              data-testid="test-todo-cancel-button"
            >
              Cancel
            </button>
          </div>
        </form>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
